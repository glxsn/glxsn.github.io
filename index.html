<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>或许会有帮助</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        /* 配色方案 */
        :root {
            --primary: #7D9DCA;
            --primary-light: #E1E9F5;
            --secondary: #E8D8C5;
            --text: #3A3A3A;
            --text-light: #666666;
            --light: #FAFAFA;
            --card-bg: #FFFFFF;
            --highlight: #FF7E67;
        }
        
        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 导航栏 */
        header {
            padding: 25px 0;
            text-align: center;
            background-color: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        
        nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            position: relative;
        }
        
        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        nav a:hover {
            color: var(--primary);
            background-color: var(--primary-light);
        }
        
        nav a.active {
            color: white;
            background-color: var(--primary);
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(125, 157, 202, 0.3);
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background-color: var(--highlight);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 3px;
        }
        
        nav a:hover::after {
            width: 60%;
        }
        
        nav a.active::after {
            width: 80%;
            background-color: white;
        }
        
        /* 搜索框样式 */
        .search-container {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .search-box {
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .search-input {
            padding: 10px 15px;
            border: 2px solid var(--secondary);
            border-radius: 50px;
            outline: none;
            font-size: 14px;
            width: 200px;
            transition: all 0.3s ease;
            background-color: var(--light);
        }
        
        .search-input:focus {
            border-color: var(--primary);
            width: 250px;
        }
        
        .search-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            background-color: var(--highlight);
            transform: scale(1.05);
        }
        
        /* 搜索结果样式 */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
            display: none;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .search-result-item {
            padding: 15px;
            border-bottom: 1px solid var(--secondary);
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: var(--primary-light);
        }
        
        .search-result-title {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .search-result-excerpt {
            color: var(--text-light);
            font-size: 0.9em;
        }
        
        .no-results {
            padding: 20px;
            text-align: center;
            color: var(--text-light);
        }
        
        /* 主要内容区 */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 30px;
            flex: 1;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            font-weight: 300;
            text-align: center;
            color: var(--primary);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--highlight));
            border-radius: 3px;
        }
        
        /* 卡片式内容区块 */
        .card {
            background: var(--card-bg);
            padding: 40px;
            margin-bottom: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--primary);
            position: relative;
            padding-bottom: 10px;
        }
        
        .card h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background-color: var(--highlight);
            border-radius: 3px;
        }
        
        .card p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--text-light);
            line-height: 1.8;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-light);
            font-size: 14px;
            background-color: var(--card-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
            margin-top: 50px;
        }
        
        footer p {
            margin: 0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            
            nav {
                flex-direction: column;
                gap: 10px;
                align-items: center;
                padding-bottom: 60px;
            }
            
            nav a {
                width: 80%;
                text-align: center;
            }
            
            .search-container {
                position: static;
                transform: none;
                margin: 15px auto;
                width: 90%;
            }
            
            .search-input {
                width: 100%;
            }
            
            .search-input:focus {
                width: 100%;
            }
            
            .search-results {
                width: 100%;
                left: 0;
            }
            
            .container {
                padding: 0 20px;
            }
            
            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="active">首页</a>
            <a href="bi.html">关于</a>
            <a href="dh.html">作品</a>
            <a href="#">联系</a>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索文章..." id="searchInput">
                    <button class="search-btn" id="searchBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                        </svg>
                    </button>
                    <div class="search-results" id="searchResults"></div>
                </div>
            </div>
        </nav>
    </header>
    
    <div class="container">
        <h1>· 给力小少年的板块！ ·</h1>
        
        <div class="card">
            <h2>关于这个界面</h2>
            <p>欢迎来到我的个人空间！这里是一个正在不断完善的创意平台，我会在这里分享我的想法、作品和经验。</p>
            <p>还会完善哒</p>
        </div>
        
        <div class="card">
            <h2>关于这个板块</h2>
            <p>这里主要分享我在游戏Mod开发过程中遇到的各种问题和解决方案，包括但不限于：</p>
            <p>• 主流游戏的Mod制作教程</p>
            <p>• 开发过程中遇到的疑难杂症</p>
            <p>• 有趣的创意实现</p>
            <p>• 偶尔也会分享一些其他技术领域的心得</p>
        </div>
        
        <div class="card">
            <h2>最新动态</h2>
            <p>• 更新了一下界面</p>
        </div>
    </div>
    
    <footer>
        <p>头发掉光光啦</p>
    </footer>
    
    <script>
        // 导航栏选中效果
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function() {
                document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 搜索功能实现（动态扫描DOM内容）
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');
            
            // 从DOM动态获取文章数据
            function getArticlesFromDOM() {
                return Array.from(document.querySelectorAll('.card')).map(card => ({
                    title: card.querySelector('h2').textContent,
                    content: Array.from(card.querySelectorAll('p'))
                               .map(p => p.textContent).join(' '),
                    url: card.querySelector('a')?.href || window.location.href,
                    excerpt: Array.from(card.querySelectorAll('p'))
                               .map(p => p.textContent).join(' ').substring(0, 100) + '...'
                }));
            }
            
            // 执行搜索
            function performSearch() {
                const query = searchInput.value.trim().toLowerCase();
                const articles = getArticlesFromDOM(); // 每次动态获取最新内容
                
                if (!query) {
                    searchResults.style.display = 'none';
                    return;
                }
                
                // 搜索逻辑
                const results = articles.filter(article => {
                    return article.title.toLowerCase().includes(query) || 
                           article.content.toLowerCase().includes(query);
                });
                
                displayResults(results);
            }
            
            // 显示搜索结果
            function displayResults(results) {
                searchResults.innerHTML = '';
                
                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="no-results">没有找到相关文章</div>';
                    searchResults.style.display = 'block';
                    return;
                }
                
                results.forEach(article => {
                    const resultItem = document.createElement('div');
                    resultItem.className = 'search-result-item';
                    resultItem.innerHTML = `
                        <a href="${article.url}" style="text-decoration: none; color: inherit;">
                            <div class="search-result-title">${highlightText(article.title, searchInput.value)}</div>
                            <div class="search-result-excerpt">${highlightText(article.excerpt, searchInput.value)}</div>
                        </a>
                    `;
                    searchResults.appendChild(resultItem);
                });
                
                searchResults.style.display = 'block';
            }
            
            // 高亮显示匹配文本
            function highlightText(text, query) {
                if (!query) return text;
                const regex = new RegExp(query, 'gi');
                return text.replace(regex, match => `<span style="background-color: yellow;">${match}</span>`);
            }
            
            // 事件监听
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('input', function() {
                // 添加防抖，避免频繁触发
                clearTimeout(this.timer);
                this.timer = setTimeout(performSearch, 300);
            });
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') performSearch();
            });
            
            // 点击页面其他地方关闭搜索结果
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-container')) {
                    searchResults.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
